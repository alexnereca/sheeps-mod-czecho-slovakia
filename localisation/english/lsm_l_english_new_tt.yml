LSM_new_world_diplomacy.41.t: "[URG.GetNameDef] proposes Federal Unification"
LSM_new_world_diplomacy.41.d: "Our friend in South America, [URG.GetLeader], has proposed that we would secede territories formerly belonging to the Federal state which [URG.GetNameDef] has succeeded, hoping to bolster their dosmetic production and strengthen their economic integrity.\n\nOf course, [URG.GetLeader] has promised appropriate compensation for our government and agreed to grant dual citizenship to any citizen in the region."
LSM_new_world_diplomacy.41.a: "Sure, why not?"
LSM_new_world_diplomacy.41.b: "It is our land now"

