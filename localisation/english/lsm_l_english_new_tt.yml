idea_EGY_army_of_egypt: "Aloof Neutrality"
idea_EGY_army_of_egypt_desc: "The leadership of Egypt is not supportive of Britain."

LSM_new_world_diplomacy.44.t: "Suez Garrison accepts our protection"
LSM_new_world_diplomacy.44.d: "Following the civil war in British home isles, the Suez garrison, now stranded amidst an ideological struggle, has surrendered the control of Suez at the demand of the [EGY.GetAdjective] government.\n\nOnce again, the Kingdom of Egypt is whole."
LSM_new_world_diplomacy.44.a: "United at last"

LSM_new_world_diplomacy.45.t: "Suez Garrison defects"
LSM_new_world_diplomacy.45.d: "Communication, while incoherent and inconsistent, has pointed out that the Suez garrison has surrendered and defected to Egyptian control as of this morning, marking an end to British over the region as Egypt and other regional protectorates drifting away following news of our civil war."
LSM_new_world_diplomacy.45.a: "Treacherous"

LSM_new_world_diplomacy.46.t: "Suez Ultimatum"
LSM_new_world_diplomacy.46.d: "The British government has issued an ultimatum over the control of the Suez channel - to either surrender or to perish."
LSM_new_world_diplomacy.46.a: "We shall abide"
LSM_new_world_diplomacy.46.b: "Arabians, unite!"

LSM_new_world_diplomacy.47.t: "Treaty of Suez"
LSM_new_world_diplomacy.47.d: "The Egyptian government has given in to our ultimatum and returned the control of the Suez channel to Britain, citing their desire for friendship and protection in the region, a point of which the British diplomats have agreed upon."
LSM_new_world_diplomacy.47.a: "As should be"

LSM_new_world_diplomacy.48.t: "Impasse at Suez"
LSM_new_world_diplomacy.48.d: "The Egyptian government has ignored our ultimatum and subsequently expelled our diplomats from the negotiation table at Suez, an action in which their antagonistic diplomatic stance to Britain appeared evident.\n\nA call for war has been motioned in the parliament, with politicians and members of the military expecting a retaliating strike to be carried out within the coming days."
LSM_new_world_diplomacy.48.a: "To war it is"

uk_suez_retake_focus: "Suez Ultimatum"
uk_suez_retake_focus_desc: "The control of Suez must be returned to Britain, whether by words and by swords."