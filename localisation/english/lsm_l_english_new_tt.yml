lsm_news.93.t: "The League of Nation"
lsm_news_ENG_FRA.93.d: "Germany, the menace of the Great War, has declared war on a member state of the League of Nation. In response, [ENG.GetNameDef] and [FRA.GetNameDef] are now rallying to launch a military intervention to the peace found in the aftermath of the previous continental conflict. Only in hindsight might one tell whether Europe has made the correct decision."
lsm_news_ENG_only.93.d: "Germany, the menace of the Great War, has declared war on a member state of the League of Nation. In response, [ENG.GetNameDef] is now rallying to launch a military intervention to the peace found in the aftermath of the previous continental conflict. Only in hindsight might one tell whether Europe has made the correct decision."
lsm_news_FRA_only.93.d: "Germany, the menace of the Great War, has declared war on a member state of the League of Nation. In response, [FRA.GetNameDef] are now rallying to launch a military intervention to the peace found in the aftermath of the previous continental conflict. Only in hindsight might one tell whether Europe has made the correct decision."
lsm_news_no_ENG_FRA.93.d: "Germany, the menace of the Great War, has declared war on a member state of the League of Nation. However, neither [ENG.GetNameDef] or [FRA.GetNameDef] has yet responded with a military intervention. Only in hindsight might one tell whether Europe has made the correct decision."
lsm_news_GER_war.93.d: "In response to our declaration of war on a member of the League of Nations, western guarantors have retaliated and declared war on ourselves.\n\nOnly time may tell whether the Fuhrer has made a correct decision in rushing ahead with his plan for expansion... or perhaps [GER.GetNameDef] has been too eager, where they should have slowly expanded in peace and force ourselves on our weaker neighbors through diplomatic means..."
lsm_news_GER_easy.93.d: "Germany, the menace of the Great War, has declared war on a member state of the League of Nation. However, neither [ENG.GetNameDef] or [FRA.GetNameDef] has yet responded with a military intervention. Only in hindsight might one tell whether Europe has made the correct decision."
lsm_news.93.a: "Aren't we a member too?"
lsm_news.93.b: "Interesting time."
lsm_news.93.c: "Vermins!"
lsm_news_93_tt: "The Fuhrer might have been too eager with his plan for expansion and overestimated his presence on the world stage... §RThe League of Nation is still effective§!"
