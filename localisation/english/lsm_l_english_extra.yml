LSM_new_world_diplomacy.15.t: "[SOV.GetAdjective] Election of [?global.year|0]"

LSM_new_world_diplomacy.15.d: "With the political turmoil in Russia having finally settled, and an interim government has been formed, the next step for our nation is to hold our first democratic election since the 1917 Russian Constituent Assembly election.\n\nThis election shall represent a new era for Russia, putting an end to the threat of communism as well as signaling the finale on the stage of history for autocratic imperialism in Russia. Nonetheless, despite the fervent calls for democratic elections, the truth remains that the coming election in Russia is "democratically" planned and agreed upon by all parties.\n\nBut perhaps in time, Russia may truly be democratic at last."

LSM_new_world_diplomacy.15.a: "The triumph of White Russian"

LSM_new_world_diplomacy.15.b: "Kerensky forms the government"

LSM_new_world_diplomacy.15.c: "Unity under a constitutional monarchy"

LSM_new_world_diplomacy.15.e: "Democracy in Socialism"

czech.37.t: "A Greater Entente for the Greater Good?"

czech.37.d: "Our ally in [YUG.GetNameDef] has proposed a greater united front in order to confront the coming threat from around the European continent. It is our hounor and duty to provide them with an appropriate answer."

czech.37.a: "No longer little!"

czech.37.b: "No compromise with the communists!"

czech.38.t: "Failure of the Greater Entente proposal"

czech.38.d: "Our former ally in [CZE.GetNameDef] has rejected our proposal for a greater united front. It is perhaps time for our nation to embark on our own journey beyond any fragile alliance with those mongrels!"

czech.38.a: "Pan-Slavic Worker Congress!"

LSM_czech.34.a: "Isn't that unfortunate?"

LSM_czech.34.b: "Rather unfortunate"

