lsm_news.1101.t: "The War in Europe"

lsm_news.1101.d: "Communication has broken down between [GER.GetNameDef] and [SOV.GetNameDef], with armies amassing at the border as the polars prepare for the continental confrontation that will decide the fate of Europe.\n\nAt this stage, it is too early to tell who may emerge victors from this conflict; however, one thing is clear, whatever the outcome may be, it will perhaps be the peace of Europe - for no other challengers may threaten the hegemony once the dust has settled."

lsm_news.1101.a: "Uraaaah!"

lsm_news.1101.b: "For our great leader [GER.GetLeader]!!"

lsm_news.1101.c: "Worrying development"

lsm_news.1200.t: "The Next Morning in Europe"

lsm_news.1200.d: "Today, history has observed what was thought to be impossible.\n\nAfter several rounds of negotiation, [GER.GetNameDef] and [SOV.GetNameDef] have formalized a pact of non-aggression and non-intervention in continental Europe to ensure the peace of every of its citizens and the future of the Old World. While it is still early to tell what the plans may be for each side who are know fully unoccupied by the brickering between one another, a fact is clear - The New World is now in danger."

lsm_news.1200.a: "They had good beer"

lsm_news.1200.b: "They had good bears"

lsm_news.1200.c: "Worrying development?"

lsm_news.1300.t: "The Next Morning in Europe"

lsm_news.1300.d: "Today, history has observed what was not even imaginable.\n\nMerely overnight, [GER.GetNameDef] and [SOV.GetNameDef] have formalized an alliance, with [GER.GetLeader] and [SOV.GetLeader] sharing a dinner as well as an announcement of brotherhood between whom they called "like-minded". Only time may tell where the ambition of these two men may steer the world towards."

lsm_news.1300.a: "A new friend, indeed!"

lsm_news.1300.b: "A new friend, perhaps!"

lsm_news.1300.c: "Impossible!"

lsm_news.1110.t: "Tension in Eastern Europe"

lsm_news.1110.d: "Despite the renewed friendship treaty and brotherhood between the two leaders, [GER.GetLeader] and [SOV.GetLeader], the circumstances have only fueled the call for war between [SOV.GetNameDef] and [GER.GetNameDef]. With every communication broken down between [GER.GetNameDef] and [SOV.GetNameDef], and their armies now amassing at the border, there is no doubt that this continental confrontation that will decide the fate of Europe.\n\nWhoever emerges victor will perhaps be the new Master of the World."

lsm_news.1110.a: "Damned Germans!"

lsm_news.1110.b: "Damned Slavs!"

lsm_news.1110.c: "Told them it was stupid"

lsm_news.1110.e: "Unsurprisingly predictable"

lsm_news.1111.t: "One Step Forward"

lsm_news.1111.d: "This morning, [SOV.GetAdjective] army and airforce has crossed the borders between [SOV.GetNameDef] and [GER.GetNameDef], initiating a large scale invasion from the eastern flank of the rising power in Central Europe. This unexpected move has caught spectators in shock, most of whom failed to even imagine the sheer mass of the invading forces. However, in [SOV.GetNameDef], the narrative could not have been any clearer:\n\nThe only possibility for [SOV.GetNameDef] to defend themselves from future aggression is by taking One Step Forward."

lsm_news.1111.a: "To Berlin!"

lsm_news.1111.b: "For the Vaterland!"

lsm_news.1111.c: "Dangerous time"

lsm_news.1111.e: "To the aid of our allies!"

