FRA_research_boost: "Contacts from France"

FRA_research_boost_desc: "Our contacts from France has been extracted alongside documents of the highest classification from captured [GER.GetAdjective] stockpile during the war.\n\nIt is only fortunate that our §Cfriendly relationship with [FRA.GetNameDef]§! has enabled this exchange."

LSM_new_world_diplomacy.7.t: "Vasterbotten Crisis"

LSM_GER_SOV.473.t: "A cargo from France"

LSM_GER_SOV.473.d: "Following the collapse of French government, countless documents of the highest classification have been evacuated, many of which had fallen into the hands of contacts in France, and in certain cases, willingly provided by the French research department. Considering the rapid development on the battlefield, the [SOV.GetAdjective] government has been urged to act with prudence and utmost urgency within the due respect that the secretive nature of this exchange may require."

LSM_GER_SOV.473.a: "Unpack The Secret"

LSM_new_world_diplomacy.7.d: "This morning, telegram from our consulate in Sweden has delivered the news that the Swedish government has seized the Vasterbotten mines, which they had previously ceded the access right to Germany, and applied a diplomatic sanction on our diplomats. This action by the Swedish government has violated our previous terms, and has certainly impeded the diplomatic proceedings between our nations. Nonetheless, as it now stands that the government of Sweden has no longer any interest in further business dealings with us, it is perhaps called for that we take drastic measures to enforce our rights."

LSM_new_world_diplomacy.7.a: "It is what it is"

LSM_new_world_diplomacy.7.b: "We demand what is right!"

