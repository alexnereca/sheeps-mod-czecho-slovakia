LSM_new_world_diplomacy.35.t: "The League of Nations"

LSM_new_world_diplomacy.35.d: "Germany, the menace of the Great War that plunged the world into discord and razed Belgium in an act of terror, has at once declared war on a member of the League of Nations. In return, the League of Nations is considering an intervention, which is in effect a retaliation against Germany to stamp out this threat for the good of the world."

LSM_new_world_diplomacy.35.a: "The League remains in effect!"

LSM_new_world_diplomacy.35.b: "The League has no sway..."

