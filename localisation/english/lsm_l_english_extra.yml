lsm_news.1999.t: "The Plot in Africa"

lsm_news.1999.d: "This morning, the [ITA.GetAdjective] government has announced the total capitulation of Ethiopia as well as the full annexation of their government for plot purposes (either because Soviet volunteers killed them or because Ethiopia would become a huge PITA later). As a compensation, any countries that have supported Ethiopia will receive some manpower, equipment, army experience, and hopefully that may soothe the rage of the players. Hopefully, copefully so."

lsm_news.1999.a: "Who cares"

lsm_news.1999.b: "Compensation is good"

lsm_news.1999.c: "Nah, release Ethiopia, they have won"

lsm_news.300.t: "Endsieg!"

lsm_news.300.d: "I ask you: Do you want the total war?! Do you want it, if necessary, more total and radical than anything that we can yet today even conceive?! Nun, Volk, steh auf, und Sturm, brich los! Now, people, rise up, and storm, break loose!\n\nI expect every German to do his duty to the last and that he be willing to take upon himself every sacrifice he will be asked to make; I expect every able-bodied German to fight with the complete disregard for his personal safety; I expect the sick and the weak or those otherwise unavailable for military duty to work with their last strength; I expect all women and girls to continue supporting this struggle with utmost fanaticism!"

lsm_news.300.a: "Interesting development"

lsm_news.300.b: "For the Liberation of Europe!"

lsm_news.300.c: "To the Defence of the Reich!"

