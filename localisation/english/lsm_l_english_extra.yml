LSM_GER_SOV.506.t: "The Threat of Communism"

LSM_GER_SOV.506.d: "The Rising Threat of Communism from the recent expansion by [SOV.GetNameDef] has caused widespread concern amongst the Japanese populace and administration, many of whom are now suggesting a formal alliance with [GER.GetNameDef] and [CHI.GetNameDef] to solve prioritize tackle the threat of communism over our claims against western imperialism."

LSM_GER_SOV.506.a: "Send a letter to [GER.GetLeader]..."

LSM_GER_SOV.506.b: "...but make it a birthday card"

LSM_GER_SOV.507.t: "The Threat of Communism"

LSM_GER_SOV.507.d: "The Rising Threat of Communism from the recent expansion by [SOV.GetNameDef] has caused widespread concern amongst the Japanese populace and administration, many of whom are now suggesting a formal alliance with [GER.GetNameDef]. Towards that end, the [JAP.GetAdjective] government has extended an offer with us to formalize a treaty of prosperity between [CHI.GetAdjective] and [JAP.GetAdjective], with the aim to organize a military alliance with [GER.GetNameDef]."

LSM_GER_SOV.507.a: "Send a letter to [JAP.GetLeader]..."

LSM_GER_SOV.507.b: "...and say no."

LSM_GER_SOV_506_a_tt: "If both China and Japan agree for a peace: \n\n1. Japan will get concession over Northern China.\n\n2. China will lose claims over Japanese sphere of now-former Chinese territories."

LSM_GER_SOV_506_b_tt: "Nothing will happen for now, but China might still ally with Germany later."

