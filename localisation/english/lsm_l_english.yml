LSM_GER_SOV.200.t: "A Word of Warning from the General Staff"

LSM_GER_SOV.200.d: "Concerned with the current diplomatic circumstance, the General Staff has presented to [GER.GetLeader] a proposal today, alongside a warning of the possibility of a two-front wars, provided that the [SOV.GetNameDef] may turn into a potential hostile force. Of course, while their concern is not entirely unfounded, it is clear that the [SOV.GetNameDef] is in no position to wage war at the moment; as such, it is entirely possible whatever diplomatic stance of theirs may turn out to be a complete bluff.\n\nHowever, given that our objective may align for the time being, it should perhaps be considered that a non-aggression treaty between the two nations may be of the best interest."

