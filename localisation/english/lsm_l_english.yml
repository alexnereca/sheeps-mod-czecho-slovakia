lsm_news.3.t: "American Treaty Organisation Summit"

lsm_news.3.d: "This evening, [From.GetNameDef] has issued a joint defense statement to address the rising threat from Europe and from Asia, and to respond to any possible invasion from those threats by bolstering the production front, the construction of naval warships, as well as a general conscription.\n\nRushing down upon the strained and tedious maritime routes are now the mighty fleets of the Old World, armed and ready for the decisive confrontation, and on the other side of the Atlantic, millions upon millions of troops await their moment to set foot onto the New. From this point onwards, only through a devotion to duty and a steadfast attitude towards foreign imperialism may the New World of America hope to survive the ruthless onslaught."

lsm_news.3.a: "God blesses them"

lsm_news.3.b: "Onto the New World!"

lsm_news.3.c: "For Democracy and Freedom!"


lsm_news.4.t: "[From.GetNonIdeologyName] to Cross The Atlantic"

lsm_news.4.d: ""One battle, one will, one goal: Victory at any cost!"- [FROM.GetLeader] has announced, pointing towards the drydocks and the factories as a plan for the construction of tens of thousands new navy vessels had been drafted in minute details, in order to cross the Atlantic. Spectators hold their breathe, however, at the sight of the new mighty battleship. War has begun between the Old World and the New - but only time may tell which side will truly emerge victors."

lsm_news.4.a: "Good luck then"

lsm_news.4.b: "Onto the New World!"


lsm_news.5.t: "[From.GetNonIdeologyName] to Cross The Pacific"

lsm_news.5.d: ""One battle, one will, one goal: Victory at any cost!"- [FROM.GetLeader] has announced, pointing towards the drydocks and the factories as a plan for the construction of tens of thousands new navy vessels had been drafted in minute details, in order to cross the Pacific. Spectators hold their breathe, however, at the sight of the new mighty aircraft carrier fleet. Hell has now been let loose over the islands and the calm seas, but only time may tell which side will truly emerge victors."

lsm_news.5.a: "Good luck then"

lsm_news.5.b: "Onto the New World!"



