LSM_equipment.24.t: "A proposal from Romania"

LSM_equipment.24.d: "Romania has offered us the full access to the oil reserves in Muntenia in exchange for economic support and industrial investment. Of course, while Germany has no reason to oblige to such request, this might prove to be a great fortune in our favour."

LSM_equipment.24.a: "Agree to the proposal"

LSM_equipment.24.b: "Their demand is out of hand"

LSM_equipment.25.t: "Germany accepts the proposal"

LSM_equipment.25.d: "Having concluded that their benefits outweighed their cost, the [GER.GetAdjective] government has accepted our proposal with a welcoming hand. The era of prosperity for Romania may now truly begin."

LSM_equipment.25.a: "Together for victory"

LSM_equipment.26.t: "Germany rejects the proposal"

LSM_equipment.26.d: "Having concluded that their costs outweighed their benefits, the [GER.GetAdjective] government has rejected our proposal without a second thought. The prosperity of Romania may have to wait a while longer."

LSM_equipment.26.a: "A missed opportunity"

