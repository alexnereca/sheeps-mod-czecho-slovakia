LSM_ENG_churchill.50.d: "With the defeat of Britain looming over our fate, our citizens must now prepare to face an even greater struggle than before. Ey mate! Ay sleeping aint ya?! Its foking time to shine, mate!"

LSM_ENG_churchill.50.a: "For the Empire"

LSM_ENG_churchill.50.b: "For the Empire"

LSM_ENG_churchill.50.c: "Fuck off"

LSM_ENG_churchill.60.t: "Britain approaches us"

LSM_ENG_churchill.60.d: "Our greatest ally will soon fall under the menacious tyranny from Europe. Many members of our surviving cabinet suggests that we should form an Union with the crumbling Empire, one that will perhaps endure for the challenging time to come, and even beyond those darkness, so that one day our children may return home, that one day this shadow may thus be repelled by the will of those few men who have decided never to surrender."

LSM_ENG_churchill.60.a: "Together for Victory"

LSM_ENG_churchill.60.b: "We will eventually go separate ways anyways"

LSM_ENG_churchill.100.t: "Britain approaches us"

LSM_ENG_churchill.100.d: "We have received a communication from the British government this morning to express their desire to surrender colonies belonging to the Empire and renounce any existing alliance with other enemies of ours. Taking this offer will free up our forces and lessen the burden on our garrison effort, but we will also renounce all claims on the surviving states for the time being."

LSM_ENG_churchill.100.a: "Well, why not?"

LSM_ENG_churchill.100.b: "Go big or go home"

ENG_churchill_plan: "Case Winston"


#SOV section

lsm_news.1000.t: "Order 227"

lsm_news.1000.d: "Not one step back! - [SOV.GetLeader] addressed the few and the many standing before him, with no less than a tormented grunt that himself may hardly stomach. Stressful news from the frontline flooded his desk, with reports of the [SOV.GetAdjective] army falling apart and on the verge of collapse.\n\nHe knew, [SOV.GetNameDef] knew, however, that a great sacrifice had to be made, that thousands would choke in their own pool of blood in a bottomless pit of desparation, under what may have been the greatest menace in all history. And [SOV.GetLeader] knew, with every ounce of confidence in his heart - that no army is ever invincible."

lsm_news.1000.a: "Good luck"

lsm_news.1000.b: "Delusional Fool"

lsm_news.1000.c: "Soldiers, charge!"

lsm_news.200.t: "Homefront"

lsm_news.200.d: "Then there comes a whisper in the dark, a rumour in the wind. A lie, perhaps! Or a disguise, as mere hearsays circulate beyond what was once a web of otherwise infinitesimally insignificant individuals, those who bear but one goal in mind - the freedom of Britain, the freedom of the democratic world of Europe!\n\nThe occupiers understand the truth very well, naught has escaped their watchful gaze as though the light of God has granted them guidance on this sinful path - yet for every ray of light, so cast forth a layer of shade.\n\nBritain shall never surrender."

lsm_news.200.a: "Worrying development"

lsm_news.200.b: "Send in the army!"

lsm_news.200.c: "God blesses them"

lsm_news.200.e: "There'll Always Be A Britain"

lsm_news.201.t: "Britons, awake!"

lsm_news.201.d: "I give you a toast, ladies and gentlemen. May this fair dear land we love so well. In dignity and freedom dwell, though worlds may change and go awry, while there is still one voice to cry. There'll always be a Britain, while there's a country lane, wherever there's a cottage small, beside a field of grain.\nThere'll always be a Britain, while there's a busy street, wherever there's a turning wheel, a million marching feet. Red, white and blue! What does it mean to you? Surely you're proud, shout it aloud, if Britain means as much to you, as Britain means to me."

lsm_news.201.a: "May there be peace"

lsm_news.201.b: "Send in the tanks!"

lsm_news.201.c: "God blesses us all!"

lsm_news.201.e: "Britons, awake!"

LSM_ENG_churchill.665.t: "The Calm Before The Storm"

LSM_ENG_churchill.665.d: "With frequent riots and outbreak of violence in the Western Europe, it has become increasingly concerning that the possibility of a major uprising may occur in near future. While this matter seems unlikely to affect our current war plan elsewhere, it is now a matter of fact that we must move quick to ensure our security in the region, lest every ounce of our effort during this war collapses overnight."

LSM_ENG_churchill.665.a: "Send in the army then"

LSM_ENG_churchill.665.b: "What may those peasants do?"

LSM_ENG_churchill.666.t: "Britons, arise!"

LSM_ENG_churchill.666.d: "Every now and then, I recall the face of my then... ugh, then young nephews, those who have sacrificed themselves to buy time for our cabinet to escape. Frankly, I may hardly even remember how they looked like... But I remember those smiles, brimming with hope, confidence, and perhaps with a touch of our stoicism that has triumphed over time. And I know, with all my heart, that those finest young men did not think twice before throwing themselves into the damn bloody battles... they sure did not."

LSM_ENG_churchill.666.a: "Never surrender!"

LSM_ENG_churchill.667.t: "Militia Resistance Destroyed"

LSM_ENG_churchill.667.d: "After a long period of constant clashes with militias in Britain and in France, we have finally been able to destroy the root of the problem and completely annihilated any possible dissent towards our occupations. Of course, it was not without cost. Factories are destroyed, thousands upon thousands of Britons were put to trial or to the firing squad, with many others starved into submission before being hanged for the public to understand their place in the world. Nonetheless, the war of resistance in Western Europe is over."

LSM_ENG_churchill.667.a: "Finally some rest..."

LSM_ENG_churchill.668.t: "Militia Resistance Destroyed"

LSM_ENG_churchill.668.d: "Oh how I shed a tear of sadness! For my kins may arise no longer, for blood has dyed this river red, for this sorrow has dyed our sky grey! Oh, Britain, we shall never give up! We shall never falter, we shall always fight! Oh Britain, my beautiful homeland, oh Britain, my beautiful dream. I will meet you there, friends of mine in heaven, for I will follow you, on this path to liberation!"

LSM_ENG_churchill.668.a: "Britain, I will return!"

LSM_new_world_diplomacy.5.t: "Korean Civil War"

LSM_new_world_diplomacy.5.d: "The time has come, comrades, to cast the old shackles placed upon us by the vile imperialists of the world! Behind us rallies the power of socialist brotherhood, those who have expressed solely their interest in that our peninsula remains unified and prosperous. Comrade, the time has come! To war!"

LSM_new_world_diplomacy.5.a: "To War!!"

