anti_soviet_separatism_0_desc: "The population of this region has grown distrustful towards the [SOV.GetAdjective] regime, and their recent reintegration into [SOV.GetNameDef] has been a distasteful endeavour, causing its people to resist this process of reintegration.\n\n§CThis state will be automatically reintegrated into the Soviet Union once the separatism tires out, becoming a core territory of [SOV.GetNameDef] if it has previously been claimed.§!"

