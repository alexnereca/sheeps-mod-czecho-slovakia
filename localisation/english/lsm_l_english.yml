GER_ROM_dev_tt: "§CConstruction project will begin for Germany for the next 180 days, once it has concluded, Romania will receive 4 civilian factories and 4 military factories.§!"

LSM_equipment.27.t: "Romanian-German Construction Project Completion"

LSM_equipment.27.d: "After 6 months of hardwork, the historic agreement between Romania and Germany has culminated into an economic and industrial leap for our nation. May this strong bond foster even better future opportunities for the benefits of our two nations."

LSM_equipment.27.a: "Together for Victory"
