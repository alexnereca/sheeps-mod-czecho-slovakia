USA_tora_tora_tora_idea: "Lima Charlie! Lima Delta!"
USA_tora_tora_tora_idea_desc: "The United States of America has seized the initiative in the war in the Pacific, thoroughly exploiting the unpreparedness of Japan to execute a series of attack across the islands."
lsm_news.1115.t: "Lima Charlie! Lima Delta!"
lsm_news.1115.d: "With the fleets of the Empire of Japan now in full throttle against the British, the United States of America has seized the initiative to escalate the war in the Pacific, thoroughly exploiting the unpreparedness of Japan to execute a series of attack across the region. Despite the waning war support from the Home Front, president [USA.GetLeader] has called for national unity and a united front against the rising threat of extremism both from Europe and from Asia.\n\nThere will be no further discussion, no further debates - the United States of America will bear its might upon those evildoers that have threatened democracy!"
lsm_news.1115.a: "Treacherous!"
lsm_news.1115.b: "And so it begins."
LSM_new_world_diplomacy.12.t: "The War in Asia-Pacific"
LSM_new_world_diplomacy.12.d: "The Empire of Japan has declared war on Britain, threatening the sovereignty of our democratic bastion in Europe. The War Department has presented the president with a war plan against Japan, which the War Plan division has drafted as a back up in preparation for the state of Emergency."
LSM_new_world_diplomacy.12.a: "Intervention in the Pacific"
LSM_new_world_diplomacy.12.b: "Not our problem"
LSM_new_world_diplomacy.13.t: "The Day of Dignity"
LSM_new_world_diplomacy.13.d: "The Arsenal of Democracy arouses, its infurating indignation stirred, the full might of the United States wakes up at last.\nThe time for war has begun."
LSM_new_world_diplomacy.13.a: "For Democracy!"
LSM_new_world_diplomacy.13.b: "The Giant Wakes"
LSM_new_world_diplomacy.13.c: "Let's call it off"
