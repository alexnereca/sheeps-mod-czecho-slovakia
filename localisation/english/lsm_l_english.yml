lsm_news.1.t: "Winston Churchill Announced His Plan"

lsm_news.1.d: "This morning, in a broadcast from [ENG.Capital.GetCapitalVictoryPointName], the Prime Minister of the United Kingdom and the British Empire has given a speech to his citizens, to those living the now subjugated islands, those beyond the seas and oceans, beyond the storm and blizzard, or in the heat of the mighty desert to its tropical forests and jungles, to every subjects of the vast empire. Little may anybody recall what he said, only a single quote - we shall go onto the end, we shall never surrender!\n\nWith that, the British government has now retreated to overseas territories in Canada and in South Africa, seeking refugee away from Europe with the hope to continue their war effort from abroad."

lsm_news.1.a: "Everywhere I go... I see his face"

lsm_news.1.b: "Curse you, Churchill the Prime Minister!"

lsm_news.1.c: "We have to prepare"

lsm_news.2.t: "[FROM.GetLeader] Announced His Plan"

lsm_news.2.d: "This morning, from the cabinet room in Downing Street, the Prime Minister of the United Kingdom and the British Empire has given a speech to his citizens, announcing his concession to foreign governments, including the surrender of the majority of the Empire's colonies and subjects, barring the dominions.\n\nIn return, they have been given a guarantee not to interfere with British politics for as long as war reparations are regularly paid. It was a bitter defeat for the British government to announce such concession; however, the United Kingdom and her dominions may live on."

lsm_news.2.a: "God blesses the King..."

lsm_news.2.b: "Pathetic, much to our liking"

lsm_news.2.c: "Democracy has fallen"

LSM_ENG_churchill.1.t: "We shall go onto the end"

LSM_ENG_churchill.1.d: "We shall never surrender, and even if this island is subjugated, then our Empire beyond the seas, armed and guarded by the British Fleet, would carry on the struggle, until, in God’s good time, the New World, with all its power and might, steps forth to the rescue and the liberation of the old."

LSM_ENG_churchill.1.a: "The Empire holds on"

LSM_ENG_churchill.1.b: "We have been defeated"

LSM_ENG_churchill.10.t: "Britain approaches us"

LSM_ENG_churchill.10.d: "With the defeat of Britain looming over our fate, our citizens must now prepare to face an even greater struggle than before. Onto the beaches, soldiers and sailors! We shall not surrender!"

LSM_ENG_churchill.10.a: "For the Empire"

LSM_ENG_churchill.10.b: "For the Empire"

LSM_ENG_churchill.10.c: "Fuck off"

LSM_ENG_churchill.20.t: "Britain approaches us"

LSM_ENG_churchill.20.d: "With the defeat of Britain looming over our fate, our citizens must now prepare to face an even greater struggle than before. To the desert and the jungles, my friends! The legendary epic of Africa has yet to begin!"

LSM_ENG_churchill.20.a: "For the Empire"

LSM_ENG_churchill.20.b: "For the Empire"

LSM_ENG_churchill.20.c: "Fuck off"

LSM_ENG_churchill.30.t: "Britain approaches us"

LSM_ENG_churchill.30.d: "With the defeat of Britain looming over our fate, our citizens must now prepare to face an even greater struggle than before. To the islands, to the shore! Our time is now!"

LSM_ENG_churchill.30.a: "For the Empire"

LSM_ENG_churchill.30.b: "For the Empire"

LSM_ENG_churchill.30.c: "Fuck off"

LSM_ENG_churchill.40.t: "Britain approaches us"

LSM_ENG_churchill.40.d: "With the defeat of Britain looming over our fate, our citizens must now prepare to face an even greater struggle than before. The Indian people rally along the strong arms of the Commonwealth Nations!"

LSM_ENG_churchill.40.a: "For the Empire"

LSM_ENG_churchill.40.b: "For the Empire"

