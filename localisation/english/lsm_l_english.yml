LSM_the_final_push: "Endsieg - The Final Push"

LSM_the_final_push_desc: "One Final Battle, One Final Year. Onwards, to Victory!!!"

LSM_the_final_push_success: "Endsieg - [Root.GetFactionName] Victory"

LSM_the_final_push_failure: "Endsieg - [GER.GetFactionName] Victory"

LSM_the_final_push_success_desc: "The Germans are still in places resisting the Russian troops, but should they continue to do so after midnight they will, of course, deprive themselves of the protection of the laws of war, and will be attacked from all quarters by the Allied troops. Finally, almost the whole world was combined against the evil-doers, who are now prostrate before us!"

LSM_the_final_push_failure_desc: "Despite our effort, the German war machine could not be brought an end. However, those evildoers shall never elude justice. We must go forward if we are to secure the ultimate victory!"

LSM_the_final_push_failure_GER: "Defeat in World War II"

LSM_the_final_push_failure_GER_desc: "Here in Berlin, where the war of annihilation was conceived and from where it was unleashed, and whither it returned with the full force of destruction – we had planned to commemorate this day jointly with others. I ask all Germans to remember silently the victims of the war and the victims of National Socialism. Wherever your roots may lie, take a moment to revisit your memories, your family’s memories, the history of the country in which we all live. Think what the liberation means for your life and your actions."

LSM_the_final_push_success_GER: "Our Ultimate Victory under [GER.GetLeader]"

LSM_the_final_push_success_GER_desc: "Therefore I expect every German to do his duty to the last and that he be willing to take upon himself every sacrifice he will be asked to make; I expect every able-bodied German to fight with the complete disregard for his personal safety; I expect the sick and the weak or those otherwise unavailable for military duty to work with their last strength; I expect city dwellers to forge the weapons for this struggle and I expect the farmer to supply the bread for the soldiers and workers of this struggle by imposing restrictions upon himself; I expect all women and girls to continue supporting this struggle with utmost fanaticism."

endsieg_idea: "Endsieg - The Ultimate Victory"

endsieg_idea_desc: "I ask you: Do you want the total war?! Do you want it, if necessary, more total and radical than anything that we can yet today even conceive?! Nun, Volk, steh auf, und Sturm, brich los! Now, people, rise up, and storm, break loose!\n\n§RA favourable outcome for [GER.GetNameDef] at the conclusion of Endsieg will greatly boost German morale!§!"

LSM_victory_in_europe: "Victory in Europe"

LSM_victory_in_europe_desc: "The German war is therefore at an end. After years of intense preparation, Germany hurled herself on Poland at the beginning of September, 1939; and, in pursuance of our guarantee to Poland and in agreement with the French Republic, Great Britain, the British Empire and Commonwealth of Nations, declared war upon this foul aggression. After gallant France had been struck down we, from this Island and from our united Empire, maintained the struggle single-handed for a whole year until we were joined by the military might of Soviet Russia, and later by the overwhelming power and resources of the United States of America."

LSM_the_final_push_decision: "Downfall of the Reich"

