lsm_news.1112.t: "The Beginning of The End?"

lsm_news.1112.d: "This morning, leaders of global leading countries have convened in the absence of §R[FROM.GetNameDef]§!, discussing the rising tension caused by a single nation in Europe and the possibility of a coming world war, as well as the possibility of an international effort to contain the coming threat.\n\nWhile little is known of the details, there is no voice of condemnation from any parliament with regards to the commitment of their respective head of state towards [FROM.GetNameDef], which has by now already extended its influence across Europe and all over the world."

lsm_news.1112.a: "So be it."

lsm_news.1112_a_tt: "You have caused too much world tension and threatened the sovereignty of Europe, forcing other nations to band together under one banner to contain the rising threat.\nNow you may enjoy your game of Ragnarok."

lsm_news.1112.b: "To the defense of global freedom."

lsm_news.1112.c: "Here comes a rising tension..."

