LSM_new_world_diplomacy.11.t: "European Economic Recovery Plan"

LSM_new_world_diplomacy.11.d: "Now that the war in Europe is over, the whole continent lies tattered and in ruins. While many other economic recovery plans are in place, without the tremendous wealth of the United States, the recovery of Europe will be a long and difficult process. One may only hope that one day, the Old World would be restored to its pre-war beauty and glory."

LSM_GER_SOV.201.t: "The Collapse of Mainland European Democracies"

LSM_GER_SOV.201.d: "Following the collapse of democratic states in Western Europe, it is now evident that the next step for the Reich is sweep through the remaining states in Europe. As it stands, Germany has today issued their so-called willingness to protect Poland from the Communist menace as well as offering us the technological advances of the Axis best and brightest. Of course, [GER.GetLeader], who has been very happy with the previous Treaty of Danzig, sees this as an opportunity for Poland to integrate itself into a new future for Europe, and to that end, [POL.GetLeader] will have to give a response.\n\nIt is always better if we answer in a timely manner to the benefactor of our current state of Poland, however damned they may be."

