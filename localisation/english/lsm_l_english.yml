ROM_oil_for_economic_investment_desc: "Thorough prospecting of resources in Muntenia has reached the conclusion that only our German ally might possess the necessary equipment and technology to develop and extort the soil to its fullest. In return, perhaps we can request substantial industrial investment from Germany to further strengthen our economy."

