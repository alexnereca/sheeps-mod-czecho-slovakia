lsm_news.1114.t: "Operational Berlinossa"
lsm_news.1114.d: "This morning, under the direct command of [SOV.GetLeader], Operation Berlinossa was commenced across the [SOV.GetAdjective]-[GER.GetAdjective] borders. \n\nIn the official war declaration, the [SOV.GetAdjective] government has outlined the three keypoints of the Gateway to Peace, highlighting the total capitulation of the Central European menace, a complete demilitarisation, and the liberation of the various states across Europe.\n\nWith the entrance of the [SOV.GetNameDef] into the Second World War, the end to war might be closer than ever."
lsm_news.1114.a: "For the liberation of Europe!"
lsm_news.1114.b: "May war end at last."
every_man_a_soldier: "Every Man a Soldier"
every_man_a_soldier_desc: "In time of need, every man shall fight, whether with stick, with stone, or even their bare fists. In time of struggle, every man shall fight to their last breath!"
a_society_at_war: "A Society at War"
a_society_at_war_desc: "In time of need, even children shall fight, whether with stick, with stone, or even their bare fists. In time of struggle, everybody shall fight to their last breath!"
LSM_equipment.22.t: "A Country at War!"
LSM_equipment.22.d: "China is under attack, her sovereignty and freedom is being threatened by the tyranny of Japan. With little time we have left to mobilise for our confrontation, we must decide the path for China to go forward.\n\nLi Zongren, the architect of our defense, suggests a radical social mobilisation to bolster our military production, while the Generalissimo's vision is to reform our bureaucratic measures to strengthen our army."
LSM_equipment.22.a: "Bolster our production"
LSM_equipment.22.b: "Strengthen our army"
