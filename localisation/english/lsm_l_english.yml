SOV_recovery_from_the_shock_desc: "While several sectors amongst the population has grown supportive of the present separatist sentiment across the various integrated SSR in Eastern Europe due to the initial stance of the [SOV.GetAdjective] army, as well as their ability in defending the population from the invaders, trust may gradually be earnt again as they organise themselves to resist the ongoing aggression.\n\n§C[SOV.GetNameDef] will gain 1% stability and 1% war support on monthly basis to counteract the current losses of trust.§!"

anti_soviet_separatism_3: "Rampant Nationalist Anti-Russian Separatism"

anti_soviet_separatism_2: "Significant Nationalist Anti-Russian Separatism"

anti_soviet_separatism_2a: "Moderate Nationalist Anti-Russian Separatism"

anti_soviet_separatism_1: "Weak Nationalist Anti-Russian Separatism"

pro_soviet_sentiment_1: "Pro-government Ideological Strongholds"

anti_soviet_separatism_3_desc: "The [SOV.GetAdjective] army has poorly guarded these territories, or might have even treated the populace as outsiders not worthy of protection. As a consequence, rampant separatism from the local nationalists has broken out in favour of the German aggressors.\n\n§RThis rampant distrust has caused a loss of 1% stability and 1% war support.§!"

anti_soviet_separatism_2_desc: "The [SOV.GetAdjective] army has withdrawn and given up on these territories without any significant resistance. As a consequence, significant separatism from the local nationalists has arisen in favour of the German aggressors.\n\n§RThis significant distrust has caused a loss of 1% stability and 1% war support.§!""

anti_soviet_separatism_2a_desc: "While certain amount of resistance persisted, the [SOV.GetAdjective] army has withdrawn and given up on these territories without effective defence. As a consequence, moderate separatism from the local nationalists has arisen in favour of the German aggressors."

anti_soviet_separatism_1_desc: "The [SOV.GetAdjective] army has been forced to withdrawn from these regions due to circumstance of war. While separatist sentiment cannot be denied in these regions, the strong presence of the Soviet army has bolster the populace and prevented large scale separatism."

pro_soviet_sentiment_1_desc: "The [SOV.GetAdjective] army has defended these territories to the last men. Their bravery has inspired the populace to take up arms against the aggressors.\n\n§RFor this example of gallantry, [SOV.GetNameDef] gains 1% war support.§!"

