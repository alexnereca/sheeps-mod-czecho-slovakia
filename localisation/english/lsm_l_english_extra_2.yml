SOV_the_collectivization_process_b:0 "[GetCollectivizationName]"

SOV_the_collectivization_process_b_default:0 "The Collectivization Process"

SOV_the_collectivization_process_b_alt:0 "Wartime Collectivization Policies"

SOV_the_collectivization_process_b_desc:0 "[GetCollectivizationDesc]"

SOV_the_collectivization_process_b_desc_default:0 "While a lot of work remains to be done, and though it has been badly misshandled in some regions, the process of collectivizing the farms in the Soviet Union is almost complete, and will soon yield increased production from the agricultural sector."

SOV_the_collectivization_process_b_desc_alt:0 "Our Collectivization Progress has been interrupted by the sudden outbreak of war. Of course, while there is so much work remains to be done, and while much has been mishandled in the process, our policy of change and of collectivization must now go forward with the aim to solve the most fundamental problem at hand - war!"

SOV_the_collectivization_process_tooltip_1: "$SOV_modify_the_politburo_ns_intro$ \nConsumer Goods Factories: §Y-5.0%§! \nMax Factories in a State: §G+5%§! \nConstruction Speed: §G+5.00%§! \n\n"

SOV_the_collectivization_process_c_ns_tt: "$SOV_modify_the_politburo_ns_intro$ \nConsumer Goods Factories: §Y-15.0%§! \nMax Factories in a State: §G+15%§! \nConstruction Speed: §G+15.00%§! \n\n"

SOV_the_collectivization_process_tooltip_2: "\n§RPopulation will drop across the Soviet Union as a consequence of forced collectivization during wartime, effect scales with current stability§! \n\n§C[SOV.GetAdjective] economy will embark on a two-year endeavour to recover from the onset of war, gradually strengthening our production and centralization within the party§! \n\n"

SOV_the_collectivization_process_ns_a_tt: "§RImmediate effect will be reduced if the Five Year Plan has been disrupted, the collectivization process will no longer yield any factories, and the population will grow extremely weary.§!"

SOV_organization_centralization_discipline_b:0 "[GetCentralizationName]"

SOV_organization_centralization_discipline_b_default:0 "Centralization and Discipline"

SOV_organization_centralization_discipline_b_alt:0 "A Centralized Committee for Wartime Affairs"

SOV_organization_centralization_discipline_b_desc:0 "[GetCentralizationDesc]"

SOV_organization_centralization_discipline_b_desc_default:0 "In this time of uncertainty, the people look to the Politbureau for stability and guidance. We must ensure that this organ of decision making is not only supportive of, but united behind, the decisions of Comrade Stalin."

SOV_organization_centralization_discipline_b_desc_alt:0 "In this time of uncertainty, only a firm and decisive hand may guide the Soviet Union towards stability and prosperity. The war ahead might prove trying and savage, but the Politbureau alone shall always follow one princinple - Quiet, Orderly, and Methodical."

SOV_organization_centralization_discipline_b_ns_tt: "$SOV_modify_the_politburo_ns_intro$ \nMaximum Command Power Increase: §G+50§! \nMobilization speed: §G+5.00%§! \n\n"

SOV_organization_centralization_discipline_c_ns_tt: "\nAdd §Y$SOV_planned_economy_dynamic_modifier$§!, which grants \nFactory Output: §G+10.00%§!, Lack of Resources Penalty: §G-10.00%§!, Factory Repair Speed: §G+10.00%§! \n\n"

SOV_everything_for_the_state_idea: "Centralization and Discipline"

SOV_war_economy_b:0 "[GetWarEconomyName]"

SOV_war_economy_b_default:0 "War Economy"

SOV_war_economy_b_alt:0 "A Collectivized War Economy"

SOV_war_economy_b_desc:0 "[GetWarEconomyDesc]"

SOV_war_economy_b_desc_default:0 "It is clear that the capitalist and reactionary nations on our borders are planning to strike in our moment of weakness. The sooner we shift our economy to a war footing, the better."

SOV_war_economy_b_desc_alt:0 "It is clear that the survival of the motherland is being threatened from beyond our borders by horrific evils of unimaginable terror towards our kind. Our economy, which has only recently adopted the Collectivization Process, must now embark upon a great transition into a new economy more suitable for war."

SOV_war_economy_b_ns_tt: "$SOV_modify_the_politburo_ns_intro$ \nMaximum Command Power Increase: §G+50§! \nMobilization speed: §G+5.00%§! \n\n"

war_economy_b_ns_tt_extra: "§CThanks to our current economic model, our industry can suitably adapt to a collectivized war economy in a much short period of time, providing completion to the disrupted Five Year Plan§! \n\n"

SOV_transitional_economy: "Transitional Economy"

SOV_industrialization_boost: "Introduction of Collectivization-Industrialization Policies"

SOV_industrialization_boost_2: "The Enactment of Collectivization-Industrialization Policies"

SOV_industrialization_boost_2_desc: "§RPopulation will randomly drop during the process while the industrial base undergoes drastic improvement§!"

SOV_industrialization_boost_3: "The Results of Collectivization-Industrialization Policies"

SOV_transitional_economy_desc: "We are currently undergoing a significant change in our economic model to better fit ourselves into the ongoing conflict.§COnce the transition has been completed, our economic centralization will be greatly improved.§!"

